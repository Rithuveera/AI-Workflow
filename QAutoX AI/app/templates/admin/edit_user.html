<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit User - QAutoX</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/code_modal.css') }}">
</head>

<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="brand">
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <img src="{{ url_for('static', filename='images/logo_icon.png') }}" alt="QAutoX"
                            style="height: 40px; width: auto; border-radius: 8px;">
                        <div class="logo">QAutoX</div>
                    </div>
                    <p class="tagline">Admin Console</p>
                </div>
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <a href="{{ url_for('admin.list_users') }}" class="btn btn-outline"
                        style="padding: 5px 10px; font-size: 0.8rem;">Back to List</a>
                </div>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            <div class="upload-card" style="max-width: 450px; margin: 0 auto;">
                <div class="upload-header">
                    <h2>Edit User</h2>
                    <p>Update details for user: <strong>{{ user.username }}</strong></p>
                </div>

                <form method="POST">
                    <div class="form-group">
                        <label for="username"
                            style="display: block; margin-bottom: 0.5rem; color: #ccc;">Username</label>
                        <input type="text" id="username" name="username" value="{{ user.username }}" required
                            style="width: 100%; padding: 10px; background: #2d2d2d; border: 1px solid #444; color: #fff; border-radius: 4px;">
                    </div>

                    <div class="form-group">
                        <label for="role" style="display: block; margin-bottom: 0.5rem; color: #ccc;">Role</label>
                        <select id="role" name="role"
                            style="width: 100%; padding: 10px; background: #2d2d2d; border: 1px solid #444; color: #fff; border-radius: 4px;">
                            <option value="Tester" {% if user.role=='Tester' %}selected{% endif %}>Tester</option>
                            <option value="Admin" {% if user.is_admin() %}selected{% endif %}>Admin</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label style="display: block; margin-bottom: 0.5rem; color: #ccc;">Assigned Products</label>
                        <div
                            style="max-height: 150px; overflow-y: auto; background: #2d2d2d; border: 1px solid #444; padding: 10px; border-radius: 4px;">
                            {% if all_products %}
                            {% for product in all_products %}
                            <div style="display: flex; align-items: center; margin-bottom: 5px;">
                                <input type="checkbox" id="prod_{{ loop.index }}" name="products" value="{{ product }}"
                                    {% if product in assigned_products %}checked{% endif %}
                                    style="width: auto; margin-right: 10px;">
                                <label for="prod_{{ loop.index }}"
                                    style="margin-bottom: 0; color: #fff; font-weight: normal; cursor: pointer;">{{
                                    product }}</label>
                            </div>
                            {% endfor %}
                            {% else %}
                            <p style="color: #888; font-style: italic;">No products available in the system yet.</p>
                            {% endif %}
                        </div>
                    </div>

                    <div class="form-group" style="padding-top: 1rem; border-top: 1px solid #444; margin-top: 1rem;">
                        <label for="password" style="display: block; margin-bottom: 0.5rem; color: #f87171;">Reset
                            Password (Optional)</label>
                        <input type="password" id="password" name="password"
                            placeholder="Leave blank to keep current password"
                            style="width: 100%; padding: 10px; background: #2d2d2d; border: 1px solid #444; color: #fff; border-radius: 4px;">
                        <p style="font-size: 0.8em; color: #888; margin-top: 5px;">Only enter a value if you want to
                            change the user's password.</p>
                    </div>

                    <div class="form-actions" style="margin-top: 2rem;">
                        <a href="{{ url_for('admin.list_users') }}" class="btn btn-outline"
                            style="text-decoration: none;">Cancel</a>
                        <button type="submit" class="btn btn-primary" style="flex: 1;">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </main>
</body>

</html>
